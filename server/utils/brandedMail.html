<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeedSnap Notification</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body, table, td, p, a, li { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: #f8fafc;
      color: #334155;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }
    
    .wrapper {
      width: 100%;
      background-color: #f8fafc;
      padding: 40px 16px;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }

    /* ── Header ── */
    .header {
      background-color: #ffffff;
      padding: 32px 32px 24px;
      text-align: center;
      border-bottom: 1px solid #f1f5f9;
    }
    .logo-container {
      display: inline-block;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #0f172a;
    }
    .logo-feed { color: #0f172a; }
    .logo-snap { color: #6366f1; }

    /* ── Content ── */
    .content {
      padding: 32px 40px 40px;
      font-size: 15px;
      color: #334155;
    }
    .content h1, .content h2, .content h3 {
      color: #0f172a;
      margin-top: 1.2em;
      margin-bottom: 0.6em;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.3;
      word-break: break-word;
    }
    .content p {
      margin-top: 0;
      margin-bottom: 1.2em;
      word-break: break-word;
    }
    .content p + ul { margin-top: -0.6em; }
    .content ul {
      padding-left: 0;
      margin-bottom: 1.5em;
      background-color: #f8fafc;
      padding: 24px 24px 24px 44px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }
    .content li { margin-bottom: 0.5em; }
    .content li:last-child { margin-bottom: 0; }
    .content strong { color: #0f172a; font-weight: 600; }
    
    .content a {
      color: #6366f1;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid #c7d2fe;
      transition: all 0.2s;
    }
    .content a:hover {
      color: #4f46e5;
      border-bottom-color: #4f46e5;
    }
    .content br + br { display: none; }
    
    /* Call to Action Button */
    .button {
      display: inline-block;
      background-color: #0f172a;
      color: #ffffff !important;
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
      margin: 16px 0;
      border: none;
      transition: background-color 0.2s;
    }
    .button:hover {
      background-color: #1e293b;
    }

    /* ── Footer ── */
    .footer {
      background-color: #f8fafc;
      padding: 32px;
      text-align: center;
      border-top: 1px solid #e2e8f0;
    }
    .footer p {
      margin: 6px 0;
      font-size: 13px;
      color: #64748b;
    }
    .footer-links { margin-bottom: 16px; }
    .footer-links a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 13px;
      margin: 0 10px;
      border: none;
    }
    .footer-links a:hover { color: #475569; }
    
    .footer-brand {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e2e8f0;
    }
    .footer-brand p {
      font-size: 12px;
      color: #94a3b8;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      
      <!-- Header -->
      <div class="header">
        <div class="logo-container">
          <span class="logo-feed">Feed</span><span class="logo-snap">Snap</span>
        </div>
      </div>
      
      <!-- Content Area (injected dynamically) -->
      <div class="content">
        {{content}}
      </div>
      
      <!-- Footer -->
      <div class="footer">
        <div class="footer-links">
          <a href="#">Privacy Policy</a> &bull; <a href="#">Terms of Service</a> &bull; <a href="#">Support</a>
        </div>
        <p>Powered by <strong>FeedSnap AI</strong> Analytics Engine</p>
        <p>&copy; {{year}} FeedSnap Inc. All rights reserved.</p>
      </div>
      
    </div>
  </div>
</body>
</html>
